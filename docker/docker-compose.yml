# Build and run from current code. From repo root: docker compose -f docker/docker-compose.yml up --build
# Or: cd docker && docker compose up --build

services:
  database:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - nimtable-data-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: nimtable_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nimtable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nimtable_user -d nimtable"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nimtable-network

  nimtable:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8182:8182"
    volumes:
      # Use your backend config.yaml so catalogs (e.g. polaris) from config are used
      - ../backend/config.yaml:/nimtable/config.yaml:ro
    environment:
      JAVA_OPTS: -Xmx1g -Xms256m
      # Override DB URL for Docker (config.yaml can keep localhost for local runs)
      DATABASE_URL: jdbc:postgresql://database:5432/nimtable
    healthcheck:
      # Require any response (don't use -f); backend may return 5xx while starting
      test: ["CMD", "curl", "-s", "--connect-timeout", "5", "-o", "/dev/null", "http://127.0.0.1:8182/api/catalogs"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - nimtable-network

  nimtable-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      nimtable:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      JAVA_API_URL: http://nimtable:8182
      DATABASE_URL: postgresql://nimtable_user:password@database:5432/nimtable?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
    networks:
      - nimtable-network

networks:
  nimtable-network:
    driver: bridge

volumes:
  nimtable-data-postgres:
